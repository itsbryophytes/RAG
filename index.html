<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health RAG — Debug Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0d10;
    --surface: #111418;
    --surface2: #181d24;
    --border: #222a35;
    --accent: #00e5a0;
    --accent2: #0088ff;
    --warn: #ff9500;
    --danger: #ff3b5c;
    --text: #dce8f5;
    --muted: #5a6a7e;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }
  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--muted); font-weight: 400; }
  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 2px;
    background: #00e5a020;
    color: var(--accent);
    border: 1px solid #00e5a040;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .server-url-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .server-url-wrap label { color: var(--muted); font-size: 11px; }
  .server-url-wrap input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 4px;
    width: 240px;
    outline: none;
  }
  .server-url-wrap input:focus { border-color: var(--accent2); }
  #ping-btn {
    padding: 5px 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #ping-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  #ping-status { font-size: 11px; color: var(--muted); }

  /* ── Left panel ── */
  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-section {
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }
  .panel-section:last-child { border-bottom: none; flex: 1; overflow-y: auto; }
  .section-label {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 4px; margin-top: 10px; }
  label:first-of-type { margin-top: 0; }

  input[type="text"], select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, select:focus { border-color: var(--accent2); }
  select option { background: var(--surface2); }

  .btn {
    width: 100%;
    padding: 9px;
    border-radius: 4px;
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 12px;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: #00ffb3; }
  .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Upload area ── */
  .upload-drop {
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .upload-drop:hover, .upload-drop.drag-over {
    border-color: var(--accent2);
    background: #0088ff08;
  }
  .upload-drop input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 24px; margin-bottom: 6px; }
  .upload-drop p { color: var(--muted); font-size: 11px; line-height: 1.5; }
  .upload-drop .filename { color: var(--accent2); font-size: 11px; margin-top: 6px; word-break: break-all; }

  /* ── Result card ── */
  .result-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    margin-top: 8px;
    font-size: 11px;
  }
  .result-card .kv { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .result-card .kv .k { color: var(--muted); }
  .result-card .kv .v { color: var(--text); }
  .param-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 11px; }
  .param-table th { text-align: left; color: var(--muted); padding: 4px 6px; border-bottom: 1px solid var(--border); }
  .param-table td { padding: 4px 6px; border-bottom: 1px solid #1a2230; }
  .flag-H { color: var(--danger); font-weight: 600; }
  .flag-L { color: var(--warn); font-weight: 600; }
  .flag-N { color: var(--accent); }

  /* ── Right panel (chat) ── */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── Meta bar ── */
  .meta-bar {
    padding: 8px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: 11px;
    min-height: 36px;
  }
  .meta-item { display: flex; gap: 6px; align-items: center; }
  .meta-item .ml { color: var(--muted); }
  .meta-item .mv { color: var(--text); }
  .safety-SAFE { color: var(--accent); }
  .safety-EMERGENCY { color: var(--danger); }
  .safety-UNCERTAIN { color: var(--warn); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 80%;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-user { align-self: flex-end; }
  .msg-assistant { align-self: flex-start; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 6px;
    line-height: 1.7;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-user .msg-bubble {
    background: var(--accent2);
    color: #fff;
    border-radius: 6px 6px 2px 6px;
  }
  .msg-assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px 6px 6px 2px;
    color: var(--text);
  }
  .msg-assistant.emergency .msg-bubble {
    border-color: var(--danger);
    background: #ff3b5c10;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    align-self: flex-start;
    align-items: center;
  }
  .typing-indicator span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); background: var(--accent); }
  }

  /* ── Input area ── */
  .input-area {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }
  #chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 4px;
    outline: none;
    resize: none;
    transition: border-color 0.15s;
    min-height: 42px;
    max-height: 120px;
  }
  #chat-input:focus { border-color: var(--accent2); }
  #send-btn {
    padding: 10px 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    align-self: flex-end;
  }
  #send-btn:hover { background: #00ffb3; }
  #send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* ── Log panel ── */
  .log-section { display: flex; flex-direction: column; gap: 3px; }
  .log-entry {
    font-size: 10px;
    padding: 3px 6px;
    border-radius: 2px;
    display: flex;
    gap: 8px;
  }
  .log-entry .ts { color: var(--muted); flex-shrink: 0; }
  .log-entry .lv { flex-shrink: 0; width: 40px; }
  .log-entry .lm { color: var(--text); word-break: break-all; }
  .log-INFO .lv  { color: var(--accent2); }
  .log-OK .lv    { color: var(--accent); }
  .log-WARN .lv  { color: var(--warn); }
  .log-ERR .lv   { color: var(--danger); }
  .log-ERR       { background: #ff3b5c08; }

  .disclaimer {
    font-size: 10px;
    color: var(--warn);
    margin-top: 4px;
    padding: 4px 8px;
    border-left: 2px solid var(--warn);
    opacity: 0.8;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 8px;
    font-size: 12px;
  }
  .empty-state .icon { font-size: 36px; opacity: 0.3; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Health RAG <span>/ debug console</span></div>
  <div class="badge">DEV</div>
  <div class="server-url-wrap">
    <label>SERVER</label>
    <input type="text" id="server-url" value="http://localhost:8000">
    <button id="ping-btn">PING</button>
    <span id="ping-status">—</span>
  </div>
</header>

<!-- Left panel -->
<div class="left-panel">

  <!-- Config -->
  <div class="panel-section">
    <div class="section-label">Config</div>
    <label>User ID</label>
    <input type="text" id="user-id" value="debug_user_001">
    <label>Top K</label>
    <input type="text" id="top-k" value="6">
    <label>Threshold</label>
    <input type="text" id="threshold" value="0.65">
  </div>

  <!-- Upload -->
  <div class="panel-section">
    <div class="section-label">Upload Document</div>
    <div class="upload-drop" id="drop-zone">
      <input type="file" id="file-input" accept="image/*,.pdf">
      <div class="upload-icon">📄</div>
      <p>Drop image or PDF here<br>or click to browse</p>
      <div class="filename" id="file-name" style="display:none"></div>
    </div>
    <label>Document Type</label>
    <select id="doc-type">
      <option value="lab_result">Lab Result</option>
      <option value="prescription">Prescription</option>
      <option value="clinical_note">Clinical Note</option>
      <option value="other">Other</option>
    </select>
    <button class="btn btn-primary" id="upload-btn">UPLOAD & PROCESS</button>
    <div id="upload-result"></div>
  </div>

  <!-- Log -->
  <div class="panel-section">
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">
      <span>Request Log</span>
      <span style="cursor:pointer;color:var(--muted);font-size:10px" onclick="document.getElementById('log').innerHTML=''">CLEAR</span>
    </div>
    <div class="log-section" id="log"></div>
  </div>

</div>

<!-- Right panel -->
<div class="right-panel">
  <div class="meta-bar" id="meta-bar">
    <span style="color:var(--muted);font-size:11px">Send a message to see retrieval metadata</span>
  </div>

  <div id="messages">
    <div class="empty-state">
      <div class="icon">🩺</div>
      <div>Upload a document, then ask a question</div>
      <div style="font-size:10px;opacity:0.6">e.g. "What is my hemoglobin level?"</div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="chat-input" placeholder="Ask about your health documents…" rows="1"></textarea>
    <button id="send-btn">SEND</button>
  </div>
</div>

<script>
    function addBotMessage(text) {
        clearEmptyState();

        const div = document.createElement("div");
        div.className = "msg msg-assistant";

        div.innerHTML = `
            <div class="msg-bubble">${escHtml(text)}</div>
        `;

        messagesEl.appendChild(div);
        scrollBottom();
    }
   window.addEventListener("load", () => {
  addBotMessage(`Hello! I'm ready to help. Please tell me what health-related question or topic you'd like to discuss.
You can ask me about:
• General information on medical conditions
• Symptoms and what they might mean
• Healthy lifestyle tips (nutrition, exercise, sleep)
• Understanding medical terms

How can I assist you today?`);
});
// ── Utilities ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const getServer = () => $('server-url').value.replace(/\/$/, '');

function log(level, msg) {
  const el = document.createElement('div');
  const ts = new Date().toTimeString().slice(0, 8);
  el.className = `log-entry log-${level}`;
  el.innerHTML = `<span class="ts">${ts}</span><span class="lv">${level}</span><span class="lm">${msg}</span>`;
  const logEl = $('log');
  logEl.prepend(el);
  // keep max 50 entries
  while (logEl.children.length > 50) logEl.removeChild(logEl.lastChild);
}

// ── Ping ───────────────────────────────────────────────────────────────────
$('ping-btn').addEventListener('click', async () => {
  const status = $('ping-status');
  status.textContent = '…';
  status.style.color = 'var(--muted)';
  const t0 = Date.now();
  try {
    const res = await fetch(`${getServer()}/healthz`);
    const ms = Date.now() - t0;
    if (res.ok) {
      status.textContent = `✓ ${ms}ms`;
      status.style.color = 'var(--accent)';
      log('OK', `Server responded in ${ms}ms`);
    } else {
      status.textContent = `✗ HTTP ${res.status}`;
      status.style.color = 'var(--danger)';
      log('ERR', `Ping failed: HTTP ${res.status}`);
    }
  } catch (e) {
    status.textContent = '✗ unreachable';
    status.style.color = 'var(--danger)';
    log('ERR', `Ping failed: ${e.message} — is the server running?`);
  }
});

// ── File upload UI ─────────────────────────────────────────────────────────
const dropZone = $('drop-zone');
const fileInput = $('file-input');

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) showFile(fileInput.files[0]);
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) { fileInput.files = e.dataTransfer.files; showFile(f); }
});
function showFile(f) {
  const nm = $('file-name');
  nm.textContent = `📎 ${f.name} (${(f.size/1024).toFixed(1)} KB)`;
  nm.style.display = 'block';
}

// ── Upload ─────────────────────────────────────────────────────────────────
$('upload-btn').addEventListener('click', async () => {
  const file = fileInput.files[0];
  if (!file) { log('WARN', 'No file selected'); return; }
  const userId = $('user-id').value.trim();
  if (!userId) { log('WARN', 'User ID is required'); return; }

  const btn = $('upload-btn');
  btn.disabled = true;
  btn.textContent = 'UPLOADING…';
  $('upload-result').innerHTML = '';
  log('INFO', `Uploading: ${file.name} (${file.type || 'unknown type'})`);

  const form = new FormData();
  form.append('user_id', userId);
  form.append('document_type', $('doc-type').value);
  form.append('file', file);

  try {
    const t0 = Date.now();
    const res = await fetch(`${getServer()}/api/pipeline/upload`, {
      method: 'POST',
      body: form
    });
    const ms = Date.now() - t0;
    const data = await res.json();

    if (!res.ok) {
      log('ERR', `Upload failed (${res.status}): ${data.detail || JSON.stringify(data)}`);
      $('upload-result').innerHTML = `<div class="result-card" style="border-color:var(--danger);color:var(--danger)">Error ${res.status}: ${data.detail}</div>`;
      return;
    }

    log('OK', `Upload OK in ${ms}ms — ${data.chunks_created} chunks, OCR conf: ${data.ocr_confidence}`);
    renderUploadResult(data);
  } catch (e) {
    log('ERR', `Upload exception: ${e.message}`);
    $('upload-result').innerHTML = `<div class="result-card" style="border-color:var(--danger);color:var(--danger)">Network error: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'UPLOAD & PROCESS';
  }
});

function renderUploadResult(d) {
  const sd = d.structured_data;
  let paramsHtml = '';
  if (sd && sd.parameters && Object.keys(sd.parameters).length > 0) {
    const rows = Object.entries(sd.parameters).map(([name, p]) => {
      const flagClass = p.flag ? `flag-${p.flag}` : '';
      const flag = p.flag ? `<span class="${flagClass}">${p.flag}</span>` : '—';
      return `<tr>
        <td>${name.replace(/_/g,' ')}</td>
        <td>${p.value} ${p.unit}</td>
        <td>${flag}</td>
        <td style="color:var(--muted)">${p.normal_range||'—'}</td>
      </tr>`;
    }).join('');
    paramsHtml = `<table class="param-table">
      <tr><th>Parameter</th><th>Value</th><th>Flag</th><th>Range</th></tr>
      ${rows}
    </table>`;
  }
  $('upload-result').innerHTML = `
    <div class="result-card" style="border-color:var(--accent)">
      <div class="kv"><span class="k">doc_id</span><span class="v" style="font-size:10px;color:var(--muted)">${d.document_id}</span></div>
      <div class="kv"><span class="k">chunks</span><span class="v" style="color:var(--accent)">${d.chunks_created}</span></div>
      <div class="kv"><span class="k">ocr_conf</span><span class="v">${d.ocr_confidence || '—'}</span></div>
      <div class="kv"><span class="k">lab</span><span class="v">${sd?.lab_name || '—'}</span></div>
      <div class="kv"><span class="k">date</span><span class="v">${sd?.date || '—'}</span></div>
      ${sd?.warnings?.length ? `<div style="color:var(--warn);font-size:10px;margin-top:4px">⚠ ${sd.warnings.join('; ')}</div>` : ''}
      ${paramsHtml}
    </div>`;
}

// ── Chat ───────────────────────────────────────────────────────────────────
const messagesEl = $('messages');
let isStreaming = false;
let conversationHistory = [];

function clearEmptyState() {
  const es = messagesEl.querySelector('.empty-state');
  if (es) es.remove();
}

function appendUserMsg(text) {
  clearEmptyState();
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.innerHTML = `<div class="msg-bubble">${escHtml(text)}</div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function createAssistantMsg() {
  clearEmptyState();
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  div.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function finaliseAssistantMsg(div, text, isEmergency) {
  if (isEmergency) div.classList.add('emergency');
  // Split off disclaimer if present
  const disclaimerMark = '⚠️ Medical Disclaimer:';
  const idx = text.indexOf(disclaimerMark);
  let main = text, disclaimer = '';
  if (idx !== -1) {
    main = text.slice(0, idx).trim();
    disclaimer = text.slice(idx).trim();
  }
  div.innerHTML = `<div class="msg-bubble">${escHtml(main)}</div>
    ${disclaimer ? `<div class="disclaimer">${escHtml(disclaimer)}</div>` : ''}`;
  scrollBottom();
}

function updateMetaBar(meta) {
  const safetyClass = `safety-${meta.safety}`;
  $('meta-bar').innerHTML = `
    <div class="meta-item"><span class="ml">safety</span><span class="mv ${safetyClass}">${meta.safety}</span></div>
    <div class="meta-item"><span class="ml">retrieved_chunks</span><span class="mv">${meta.retrieved_chunks}</span></div>
    <div class="meta-item"><span class="ml">emergency</span><span class="mv" style="color:${meta.is_emergency?'var(--danger)':'var(--muted)'}">${meta.is_emergency}</span></div>
    <div class="meta-item"><span class="ml">user_id</span><span class="mv" style="color:var(--muted)">${$('user-id').value}</span></div>`;
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

async function sendMessage() {
  if (isStreaming) return;
  const input = $('chat-input');
  const text = input.value.trim();
  if (!text) return;

  const userId = $('user-id').value.trim();
  if (!userId) { log('WARN', 'Set User ID first'); return; }

  input.value = '';
  input.style.height = 'auto';
  isStreaming = true;
  $('send-btn').disabled = true;
  $('send-btn').textContent = '…';

  appendUserMsg(text);
  const assistantDiv = createAssistantMsg();
  let fullText = '';
  let metaReceived = false;
  let isEmergency = false;

  log('INFO', `POST /api/chat/ — "${text.slice(0,60)}${text.length>60?'…':''}"`);

  const body = JSON.stringify({
    user_id: userId,
    message: text,
    history: conversationHistory.slice(-10),
    top_k: parseInt($('top-k').value) || 6,
    threshold: parseFloat($('threshold').value) || 0.65
  });

  try {
    const res = await fetch(`${getServer()}/api/chat/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body
    });

    if (!res.ok) {
      const err = await res.text();
      log('ERR', `Chat HTTP ${res.status}: ${err}`);
      finaliseAssistantMsg(assistantDiv, `Error ${res.status}: ${err}`, false);
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // Process complete SSE lines
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') {
          log('OK', `Stream complete — ${fullText.length} chars received`);
          break;
        }
        try {
          const event = JSON.parse(raw);
          if (event.type === 'meta') {
            metaReceived = true;
            isEmergency = event.meta.is_emergency;
            updateMetaBar(event.meta);
            log('INFO', `Meta: safety=${event.meta.safety}, chunks=${event.meta.retrieved_chunks}`);
          } else if (event.type === 'chunk') {
            fullText += event.text;
            // Live update while streaming
            const preview = fullText.replace(/\n/g, '<br>');
            assistantDiv.innerHTML = `<div class="msg-bubble">${escHtml(fullText)}</div>`;
            scrollBottom();
          } else if (event.type === 'error') {
            log('ERR', `Stream error: ${event.text}`);
            fullText += `\n[Error: ${event.text}]`;
          }
        } catch (_) {}
      }
    }

    finaliseAssistantMsg(assistantDiv, fullText, isEmergency);

    // Save to history
    conversationHistory.push({ role: 'user', content: text });
    conversationHistory.push({ role: 'assistant', content: fullText });

  } catch (e) {
    log('ERR', `Fetch exception: ${e.message}`);
    finaliseAssistantMsg(assistantDiv, `Connection error: ${e.message}\n\nIs the server running at ${getServer()}?`, false);
  } finally {
    isStreaming = false;
    $('send-btn').disabled = false;
    $('send-btn').textContent = 'SEND';
  }
}

$('send-btn').addEventListener('click', sendMessage);
$('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Auto-resize textarea
$('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Auto-ping on load
window.addEventListener('load', () => $('ping-btn').click());
</script>
</body>
</html>
